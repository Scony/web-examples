  <body>
    <div id="grid"></div>

    <script>
      const intervalMs = parseInt((new URL(window.location.href)).searchParams.get("ims") || 1000);
      const raf = parseInt((new URL(window.location.href)).searchParams.get("raf") || 0) > 0;
      const rows = parseInt((new URL(window.location.href)).searchParams.get("rs") || 20);
      const columns = parseInt((new URL(window.location.href)).searchParams.get("cs") || 20);
      const cellCount = columns * rows;

      const grid = document.getElementById("grid");
      const hud = document.getElementById("hud");
      const cells = [];

      for (let i = 0; i < cellCount; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = "Wg";
          grid.appendChild(cell);
          cells.push(cell);
      }

      const wdthValues = [400, 650, 900];
      let mutation = -1;
      function mutate() {
          const value = wdthValues[++mutation % wdthValues.length];
          const setting = `"wdth" ${value}`;
          for (const cell of cells) {
              cell.style.fontVariationSettings = setting;
          }
      }

      if (!raf)
          setInterval(mutate, intervalMs);
      else {
          requestAnimationFrame(function loop() {
              mutate();
              requestAnimationFrame(loop);
          });
      }
    </script>
  </body>
