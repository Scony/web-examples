<html>
  <body>
    <script>
      const intervalMs = parseInt((new URL(window.location.href)).searchParams.get("ims") || 1000);
      const removals = parseInt((new URL(window.location.href)).searchParams.get("r") || 1) > 0;
      const referenceRemovals = parseInt((new URL(window.location.href)).searchParams.get("rr") || 1) > 0;

      const weakRefs = [];
      const refs = [];

      function createNewElement(elementName, lambda = (el) => {}) {
          var newElement = document.createElement(elementName);
          weakRefs.push(new WeakRef(newElement));
          refs.push(newElement);
          lambda(newElement);
          return newElement;
      }

      function logRefStatistics() {
          let aliveWeakRefs = 0;
          for (let weakRef of weakRefs) {
              if (weakRef.deref())
                  aliveWeakRefs++;
          }
          console.log(`refs:${refs.length}, weakRefs:${weakRefs.length} (${aliveWeakRefs} alive)`);
      }

      setInterval(() => {
          const bs = document.getElementsByTagName('b');
          if (removals && bs.length == 10) {
              while (bs.length) {
                  if (referenceRemovals)
                      refs.splice(refs.indexOf(bs[0]), 1);
                  bs[0].remove();
              }
          }
          document.body.appendChild(createNewElement('b', (el) => { el.innerText = '.'; }));
      }, intervalMs);
    </script>
  </body>
</html>
