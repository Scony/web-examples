<html>
  <head>
    <style>
      span {
          animation-name: animate;
          animation-duration: 5s;
          animation-iteration-count: infinite;
          animation-timing-function: linear;
      }
      @keyframes animate {
          0% {
              color: #000;
          }
          50% {
              color: #fff;
          }
          100% {
              color: #000;
          }
      }
    </style>
  </head>
  <body>
    <span>span
      <p>p
        <div>div</div>
      </p>
    </span>
  </body>
</html>
