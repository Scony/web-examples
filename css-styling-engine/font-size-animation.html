<html>
  <head>
    <style>
      span {
          font-size: 20;
          animation-name: animate;
          animation-duration: 5s;
          animation-iteration-count: infinite;
          animation-timing-function: linear;
      }
      @keyframes animate {
          0% {
              font-size: 20;
          }
          50% {
              font-size: 40;
          }
          100% {
              font-size: 20;
          }
      }
    </style>
  </head>
  <body>
    <span>span
      <p>p
        <div>div</div>
      </p>
    </span>
  </body>
</html>
